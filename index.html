<script>
    const firebaseConfig = {
        databaseURL: "https://monitoring-nazhif-dan-althaf-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isMonitoring = false; // Default false dulu
    let updateInterval = null;

    // -- SETUP GRAFIK --
    const ctx = document.getElementById('iotChart').getContext('2d');
    const myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'Suhu (°C)', data: [], borderColor: '#e74c3c', tension: 0.3, fill: false },
                { label: 'Kelembapan (%)', data: [], borderColor: '#3498db', tension: 0.3, fill: false }
            ]
        },
        options: { responsive: true, scales: { y: { beginAtZero: false } } }
    });

    // 1. FUNGSI AMBIL DATA (HANYA UNTUK TAMPILAN)
    function updateDisplay(snapshot) {
        const data = snapshot.val();
        if (data) {
            const s = parseFloat(data.suhu).toFixed(1);
            const k = data.kelembapan;
            const st = data.status || "NORMAL";
            const waktu = new Date().toLocaleTimeString();

            document.getElementById("txt-suhu").innerText = s;
            document.getElementById("txt-kelembapan").innerText = k;

            // Update Grafik & Tabel hanya jika isMonitoring AKTIF
            if (isMonitoring) {
                if (myChart.data.labels.length > 15) {
                    myChart.data.labels.shift();
                    myChart.data.datasets[0].data.shift();
                    myChart.data.datasets[1].data.shift();
                }
                myChart.data.labels.push(waktu);
                myChart.data.datasets[0].data.push(s);
                myChart.data.datasets[1].data.push(k);
                myChart.update();

                const tableBody = document.getElementById("log-table-body");
                const newRow = `<tr><td>${waktu}</td><td>${s}</td><td>${k}</td><td>${st}</td></tr>`;
                tableBody.insertAdjacentHTML('afterbegin', newRow);
            }
        }
    }

    // 2. SINKRONISASI STATUS RUNNING DARI FIREBASE
    db.ref("pengaturan/running").on("value", (snapshot) => {
        isMonitoring = snapshot.val();
        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");
        
        if (isMonitoring) {
            startBtn.disabled = true;
            stopBtn.disabled = false;
            // Jalankan interval jika monitoring aktif
            runInterval();
        } else {
            startBtn.disabled = false;
            stopBtn.disabled = true;
            if (updateInterval) clearInterval(updateInterval);
        }
    });

    // 3. AMBIL DATA TERAKHIR (REAL-TIME LISTENER)
    // Supaya pas buka web langsung muncul data terakhir meski STOP
    db.ref("monitoring").on("value", (snapshot) => {
        updateDisplay(snapshot);
    });

    function runInterval() {
        if (updateInterval) clearInterval(updateInterval);
        const intervalSec = document.getElementById("intervalInput").value * 1000;
        // Kita tidak fetchData lagi, karena sudah ada .on("value") di atas
        // Interval ini hanya untuk trigger update grafik jika diperlukan
    }

    function startMonitoring() {
        const intervalVal = document.getElementById("intervalInput").value;
        db.ref("pengaturan/running").set(true);
        db.ref("pengaturan/interval").set(parseInt(intervalVal));
    }

    function stopMonitoring() {
        db.ref("pengaturan/running").set(false);
    }

    // Interval Input dikosongkan saat load pertama kali
    window.onload = function() {
        document.getElementById("intervalInput").value = ""; 
    };
</script>
