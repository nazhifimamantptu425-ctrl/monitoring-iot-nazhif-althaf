<script>
    const firebaseConfig = {
        databaseURL: "https://monitoring-nazhif-dan-althaf-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Variabel status monitoring (sinkron dengan Firebase)
    let isMonitoringActive = false; 

    // -- SETUP GRAFIK --
    const ctx = document.getElementById('iotChart').getContext('2d');
    const myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'Suhu (°C)', data: [], borderColor: '#e74c3c', tension: 0.3, fill: false },
                { label: 'Kelembapan (%)', data: [], borderColor: '#3498db', tension: 0.3, fill: false }
            ]
        },
        options: { responsive: true, scales: { y: { beginAtZero: false } } }
    });

    // 1. LISTENER UTAMA (Mendengar data dari ESP32)
    db.ref("monitoring").on("value", (snapshot) => {
        const data = snapshot.val();
        if (data) {
            const s = parseFloat(data.suhu).toFixed(1);
            const k = data.kelembapan;
            const st = data.status || "NORMAL";
            const waktu = new Date().toLocaleTimeString();

            // --- BAGIAN INI PASTI MUNCUL (Data Terakhir) ---
            document.getElementById("txt-suhu").innerText = s;
            document.getElementById("txt-kelembapan").innerText = k;

            // --- BAGIAN INI HANYA JALAN KALAU STATUS "START" ---
            if (isMonitoringActive) {
                // Update Grafik
                if (myChart.data.labels.length > 15) {
                    myChart.data.labels.shift();
                    myChart.data.datasets[0].data.shift();
                    myChart.data.datasets[1].data.shift();
                }
                myChart.data.labels.push(waktu);
                myChart.data.datasets[0].data.push(s);
                myChart.data.datasets[1].data.push(k);
                myChart.update();

                // Tambah ke Tabel
                const tableBody = document.getElementById("log-table-body");
                const newRow = `<tr><td>${waktu}</td><td>${s}</td><td>${k}</td><td>${st}</td></tr>`;
                tableBody.insertAdjacentHTML('afterbegin', newRow);
            }
        }
    });

    // 2. SINKRONISASI TOMBOL & STATUS DARI FIREBASE
    db.ref("pengaturan/running").on("value", (snapshot) => {
        isMonitoringActive = snapshot.val(); // Ambil status true/false dari Firebase
        
        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");
        
        if (isMonitoringActive) {
            startBtn.disabled = true;
            stopBtn.disabled = false;
        } else {
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }
    });

    // 3. FUNGSI TOMBOL
    function startMonitoring() {
        const intervalVal = document.getElementById("intervalInput").value || 2; 
        db.ref("pengaturan/running").set(true);
        db.ref("pengaturan/interval").set(parseInt(intervalVal));
    }

    function stopMonitoring() {
        db.ref("pengaturan/running").set(false);
    }

    // Reset input saat halaman dibuka
    window.onload = function() {
        document.getElementById("intervalInput").value = ""; 
    };
</script>
