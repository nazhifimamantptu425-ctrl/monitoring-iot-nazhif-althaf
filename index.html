<script>
    // 1. KONFIGURASI FIREBASE
    const firebaseConfig = {
        databaseURL: "https://monitoring-nazhif-dan-althaf-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Variabel Global
    let isRunning = false;

    // -- SETUP GRAFIK --
    const ctx = document.getElementById('iotChart').getContext('2d');
    const myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'Suhu (°C)', data: [], borderColor: '#e74c3c', tension: 0.3, fill: false },
                { label: 'Kelembapan (%)', data: [], borderColor: '#3498db', tension: 0.3, fill: false }
            ]
        },
        options: { responsive: true, scales: { y: { beginAtZero: false } } }
    });

    // 2. FUNGSI UPDATE TAMPILAN (Dipanggil setiap ada data baru)
    function updateUI(snapshot) {
        const data = snapshot.val();
        if (data) {
            const s = parseFloat(data.suhu || 0).toFixed(1);
            const k = data.kelembapan || 0;
            const st = data.status || "NORMAL";
            const waktu = new Date().toLocaleTimeString();

            // Tampilkan Angka Terakhir (PASTI MUNCUL MESKI STOP)
            document.getElementById("txt-suhu").innerText = s;
            document.getElementById("txt-kelembapan").innerText = k;

            // Update Grafik & Tabel HANYA JIKA STATUS DI FIREBASE = RUNNING
            if (isRunning) {
                if (myChart.data.labels.length > 15) {
                    myChart.data.labels.shift();
                    myChart.data.datasets[0].data.shift();
                    myChart.data.datasets[1].data.shift();
                }
                myChart.data.labels.push(waktu);
                myChart.data.datasets[0].data.push(s);
                myChart.data.datasets[1].data.push(k);
                myChart.update();

                const tableBody = document.getElementById("log-table-body");
                const newRow = `<tr><td>${waktu}</td><td>${s}</td><td>${k}</td><td>${st}</td></tr>`;
                tableBody.insertAdjacentHTML('afterbegin', newRow);
            }
        }
    }

    // 3. SINKRONISASI STATUS (START/STOP) DARI FIREBASE
    db.ref("pengaturan/running").on("value", (snapshot) => {
        isRunning = snapshot.val(); // Ambil status asli dari database
        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");

        if (isRunning) {
            startBtn.disabled = true;
            stopBtn.disabled = false;
        } else {
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }
    });

    // 4. MENDENGARKAN DATA MONITORING SECARA REAL-TIME
    // Ini yang bikin data terakhir langsung muncul pas web dibuka
    db.ref("monitoring").on("value", (snapshot) => {
        updateUI(snapshot);
    });

    // 5. FUNGSI TOMBOL (Update ke Firebase, bukan ke Browser sendiri)
    function startMonitoring() {
        const inputVal = document.getElementById("intervalInput").value;
        const interval = inputVal ? parseInt(inputVal) : 2; // Default 2 jika kosong
        
        db.ref("pengaturan/running").set(true);
        db.ref("pengaturan/interval").set(interval);
    }

    function stopMonitoring() {
        db.ref("pengaturan/running").set(false);
    }

    // Paksa input interval kosong saat web baru dibuka
    window.onload = function() {
        document.getElementById("intervalInput").value = "";
    };
</script>
