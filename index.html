<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Dashboard IoT - Nazhif & Althaf</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f4f8; padding: 20px; }
        .container { max-width: 850px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Layout Kontrol */
        .controls { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input[type="number"] { width: 60px; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-start { background-color: #2ecc71; color: white; }
        .btn-stop { background-color: #e74c3c; color: white; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        .temp { color: #e74c3c; font-size: 45px; font-weight: bold; }
        .soil { color: #3498db; font-size: 45px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        th { background-color: #2c3e50; color: white; padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        .status-badge { padding: 5px 12px; border-radius: 15px; font-size: 13px; color: white; background: #95a5a6; }
        .active { background: #2ecc71; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Dashboard Monitoring Pro</h2>
        <p>Sistem IoT Nazhif & Althaf</p>
        <hr>
        
        <!-- PANEL KONTROL -->
        <div class="controls">
            <label>Interval (Detik):</label>
            <input type="number" id="intervalInput" value="2" min="1">
            <button id="startBtn" class="btn-start" onclick="startMonitoring()" disabled>START</button>
            <button id="stopBtn" class="btn-stop" onclick="stopMonitoring()">STOP</button>
        </div>

        <div style="display: flex; justify-content: space-around;">
            <div>
                <p>Suhu</p>
                <div class="temp"><span id="suhu">--</span>°C</div>
            </div>
            <div>
                <p>Kelembapan</p>
                <div class="soil"><span id="kelembapan">--</span>%</div>
            </div>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Parameter</th>
                <th>Nilai</th>
                <th>Satuan</th>
                <th>Status Real-time</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Suhu</td><td id="tab-suhu">--</td><td>°C</td><td><span id="st-suhu" class="status-badge active">Streaming</span></td>
            </tr>
            <tr>
                <td>Kelembapan</td><td id="tab-kelembapan">--</td><td>%</td><td><span id="st-soil" class="status-badge active">Streaming</span></td>
            </tr>
            <tr>
                <td>Log Terakhir</td><td id="last-time" colspan="2">--</td><td><span id="st-global" class="status-badge active">ON</span></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://monitoring-nazhif-dan-althaf-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isMonitoring = true;
    let updateInterval = null;
    let tempValue = "--", humValue = "--";

    // Fungsi utama mengambil data
    function fetchData() {
        if (!isMonitoring) return;

        db.ref("monitoring").once("value").then((snapshot) => {
            const data = snapshot.val();
            if (data) {
                tempValue = data.suhu ? parseFloat(data.suhu).toFixed(1) : "--";
                humValue = data.kelembapan || "--";

                // Update ke layar
                document.getElementById("suhu").innerText = tempValue;
                document.getElementById("tab-suhu").innerText = tempValue;
                document.getElementById("kelembapan").innerText = humValue;
                document.getElementById("tab-kelembapan").innerText = humValue;
                document.getElementById("last-time").innerText = new Date().toLocaleTimeString();
            }
        });
    }

    function startMonitoring() {
        const intervalSec = document.getElementById("intervalInput").value * 1000;
        isMonitoring = true;
        
        // Atur interval
        if (updateInterval) clearInterval(updateInterval);
        updateInterval = setInterval(fetchData, intervalSec);

        // Update UI tombol
        document.getElementById("startBtn").disabled = true;
        document.getElementById("stopBtn").disabled = false;
        updateStatusBadges(true);
    }

    function stopMonitoring() {
        isMonitoring = false;
        clearInterval(updateInterval);

        // Update UI tombol
        document.getElementById("startBtn").disabled = false;
        document.getElementById("stopBtn").disabled = true;
        updateStatusBadges(false);
    }

    function updateStatusBadges(active) {
        const badges = ["st-suhu", "st-soil", "st-global"];
        badges.forEach(id => {
            const el = document.getElementById(id);
            if (active) {
                el.classList.add("active");
                el.innerText = id === "st-global" ? "ON" : "Streaming";
            } else {
                el.classList.remove("active");
                el.innerText = "Paused";
            }
        });
    }

    // Jalankan pertama kali saat web dibuka
    startMonitoring();
</script>

</body>
</html>
